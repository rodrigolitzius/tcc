 <!-- tive que mudar tudo pq tava quebrando e o site tava uma feiura, tive que fazer umas alterações pra fica bonito
 quando você coloca Login-card o css procura por login-card e não acha, aí ignora tudo. mesma coisa com Form-group. css é chato com maiúscula/minúscula
 o outro problema feio foi o .right tando dentro do .left, aí a página nunca ia ficar em duas colunas porque tava tudo empilhado dentro do mesmo bloco -->

 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>
<body>
    <div class="container">
        <div class="login-card">          
            <div class="left">
                <h1>Login</h1>
                                          
                <p style="color:#94a3b8; margin-bottom:20px;">Conecte-se ao seu navidrone</p>

                <form id="loginform">     

                    <div class="form-group">  
                        <label for="server-url">backend-url</label>
                        <input type="url" id="server-url" placeholder="Insira a URL do backend" required>
                    </div>

                    <div class="form-group">   
                        <label for="navidrome-url">Navidrome URL:</label>
                        <input type="url" id="navidrome-url" placeholder="http://seulocalhost.com" required>
                    </div>

                    <div class="form-group">   
                        <label for="nome">Usuario</label>
                        <input type="text" id="nome" placeholder="Digite seu nome de usuário" required>
                    </div>

                    <div class="form-group">   
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" placeholder="Digite sua senha" required>
                    </div>

                    <div>
                        <button type="submit" id="login-btn" class="btn-primary" style="width:100%; margin-top:8px;">Entrar</button>
                    </div>

                </form>
            </div>

            <div class="right">           
                <h2>Navdrome</h2>
                <p>Music hub</p>
                <img src="tsukasa-dance.gif" alt="Welcome" width="180">
            </div>

        </div>
    </div>                                
    <script src="app.js"></script>        
</body>
</html>
