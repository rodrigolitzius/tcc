<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon_clean.png">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="left">

    <h1>Login da conta</h1>
    <hr>
    <p>Adicionar login abaixo:</p>

    <form action="/site-simples/" method="post", id="loginform">

        <div>
            <label for="Server URL">Server URL:</label>
            <input type="url" id="server-url" name="url">
        </div>

        <div>
            <label for="Navidrome URL">Navidrome URL:</label>
            <input type="url" id="navidrome-url" name="url">
        </div>

        <div>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome">
        </div>

        <div>
            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha">
        </div>

        <div>
            <button type="submit">Entrar</button>
        </div>

    </form>
    <div class="right">
        <h2>bem-vindo</h2>
        <p>Faça o login</p>
    </div>

    <img src="tsukasa-dance.gif", width="200">
</div>
<script src="app.js"></script> <!--saporra linka na outra pasta-->


</body>
</html>
